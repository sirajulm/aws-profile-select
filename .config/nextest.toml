# cargo-nextest configuration
# https://nexte.st/docs/configuration/

[profile.default]
# Default test runner settings
slow-timeout = { period = "60s", terminate-after = 2 }

[profile.ci]
# CI profile — produces JUnit XML for Codecov Test Analytics
test-threads = "num-cpus"
fail-fast = false

[profile.ci.junit]
path = "test-results.xml"
report-name = "aws-profile-select"
