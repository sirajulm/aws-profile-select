name: "Release Please"

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # By using a PAT instead of GITHUB_TOKEN, the tag created by
      # release-please will trigger other workflows (e.g. cargo-dist's
      # release.yml which runs on push tags).
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GK_TOKEN_PAT }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

      # cargo-dist creates its own GitHub Release with binaries attached.
      # Delete the release-please one to avoid a duplicate, but keep the tag.
      - name: Delete release-please GitHub Release (keep tag for cargo-dist)
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GK_TOKEN_PAT }}
        run: |
          gh release delete "${{ steps.release.outputs.tag_name }}" --repo "${{ github.repository }}" --yes --cleanup-tag=false
