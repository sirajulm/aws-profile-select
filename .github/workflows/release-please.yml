name: "Release Please"

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

      # release-please creates both a GitHub Release and a tag.
      # cargo-dist also creates a GitHub Release when it sees the tag.
      # To avoid conflict, delete the release-please release but keep the tag.
      # cargo-dist will then create its own release with binaries attached.
      - name: Delete release-please GitHub Release (keep tag for cargo-dist)
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ steps.release.outputs.tag_name }}" --repo "${{ github.repository }}" --yes --cleanup-tag=false

      # Tags created by GITHUB_TOKEN don't trigger other workflows.
      # Re-push the tag using a PAT so the push event fires and
      # cargo-dist's release.yml (on: push: tags) picks it up.
      - name: Checkout repo
        if: ${{ steps.release.outputs.release_created == 'true' }}
        uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Re-push tag to trigger cargo-dist
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          REMOTE_URL="https://x-access-token:${{ secrets.GK_TOKEN_PAT }}@github.com/${{ github.repository }}.git"
          git fetch "${REMOTE_URL}" "refs/tags/${TAG_NAME}:refs/tags/${TAG_NAME}"
          git push --force "${REMOTE_URL}" "refs/tags/${TAG_NAME}"
